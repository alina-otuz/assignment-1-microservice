version: "3.9"

services:
  # ── Databases (separate per service – microservice rule) ─────────────────
  orders-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       orders
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - orders-data:/var/lib/postgresql/data
      - ./order-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  payments-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       payments
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - payments-data:/var/lib/postgresql/data
      - ./payment-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Services ──────────────────────────────────────────────────────────────
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    restart: on-failure
    ports:
      - "8080:8080"
      - "50052:50052"
    environment:
      ORDER_DB_DSN:              "host=orders-db port=5432 user=postgres password=postgres dbname=orders sslmode=disable"
      PAYMENT_SERVICE_GRPC_HOST: "payment-service"
      PAYMENT_SERVICE_GRPC_PORT: "50051"
      ORDER_PORT:                "8080"
      ORDER_GRPC_PORT:           "50052"
    depends_on:
      orders-db:
        condition: service_healthy
      payment-service:
        condition: service_started

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    restart: on-failure
    ports:
      - "8081:8081"
      - "50051:50051"
    environment:
      PAYMENT_DB_DSN:  "host=payments-db port=5432 user=postgres password=postgres dbname=payments sslmode=disable"
      PAYMENT_PORT:    "8081"
      PAYMENT_GRPC_PORT: "50051"
    depends_on:
      payments-db:
        condition: service_healthy

volumes:
  orders-data:
  payments-data:
