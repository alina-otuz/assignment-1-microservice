<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <style>
    .box { fill: #f4f7fb; stroke: #2d6cdf; stroke-width: 2; rx: 14; }
    .small-box { fill: #ffffff; stroke: #888; stroke-width: 1.5; rx: 10; }
    .text-title { font: 700 20px Arial, sans-serif; fill: #1f2953; }
    .text-label { font: 600 14px Arial, sans-serif; fill: #1f2953; }
    .text-small { font: 400 12px Arial, sans-serif; fill: #3f4a6b; }
    .arrow { fill: none; stroke: #2d6cdf; stroke-width: 3; marker-end: url(#arrowhead); }
    .dashed { stroke-dasharray: 8 5; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2d6cdf" />
    </marker>
  </defs>

  <rect x="40" y="30" width="260" height="120" class="small-box" />
  <text x="170" y="65" text-anchor="middle" class="text-title">External Client</text>
  <text x="170" y="90" text-anchor="middle" class="text-small">HTTP / gRPC</text>
  <text x="170" y="110" text-anchor="middle" class="text-small">curl, grpcurl, browser</text>

  <rect x="320" y="20" width="240" height="160" class="box" />
  <text x="440" y="55" text-anchor="middle" class="text-title">Order Service</text>
  <text x="440" y="80" text-anchor="middle" class="text-label">HTTP API :8080</text>
  <text x="440" y="100" text-anchor="middle" class="text-label">gRPC Server :50052</text>
  <text x="440" y="120" text-anchor="middle" class="text-small">Order creation, query, cancel, streaming</text>
  <text x="440" y="140" text-anchor="middle" class="text-small">Outbound gRPC Payment client → :50051</text>

  <rect x="620" y="30" width="240" height="120" class="small-box" />
  <text x="740" y="65" text-anchor="middle" class="text-title">Payment Service</text>
  <text x="740" y="90" text-anchor="middle" class="text-label">gRPC Server :50051</text>
  <text x="740" y="110" text-anchor="middle" class="text-small">ProcessPayment, GetByOrderID</text>

  <rect x="320" y="200" width="190" height="100" class="small-box" />
  <text x="415" y="235" text-anchor="middle" class="text-label">Order DB</text>
  <text x="415" y="255" text-anchor="middle" class="text-small">PostgreSQL orders</text>

  <rect x="620" y="200" width="190" height="100" class="small-box" />
  <text x="715" y="235" text-anchor="middle" class="text-label">Payment DB</text>
  <text x="715" y="255" text-anchor="middle" class="text-small">PostgreSQL payments</text>

  <rect x="40" y="210" width="260" height="90" class="small-box" />
  <text x="170" y="240" text-anchor="middle" class="text-label">Proto Repository</text>
  <text x="170" y="260" text-anchor="middle" class="text-small">protos/ source files</text>
  <text x="170" y="280" text-anchor="middle" class="text-small">Generated code: github.com/alina-otuz/repo-b</text>

  <path class="arrow" d="M300,90 L320,90" />
  <text x="310" y="78" text-anchor="middle" class="text-small">HTTP / gRPC</text>

  <path class="arrow" d="M560,80 L620,80" />
  <text x="585" y="68" text-anchor="middle" class="text-small">ProcessPayment gRPC</text>

  <path class="arrow" d="M740,150 L740,200" />
  <text x="760" y="175" class="text-small">persist</text>

  <path class="arrow dashed" d="M425,200 L425,160 L750,160" />
  <text x="590" y="150" text-anchor="middle" class="text-small">streaming updates trigger</text>

  <path class="arrow" d="M300,240 L320,240" />
  <text x="310" y="228" text-anchor="middle" class="text-small">proto source</text>

  <path class="arrow" d="M540,250 L620,250" />
  <text x="580" y="265" text-anchor="middle" class="text-small">payment data</text>
</svg>
