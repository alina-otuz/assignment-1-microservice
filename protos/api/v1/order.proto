syntax = "proto3";

package api.v1;

option go_package = "github.com/alina-otuz/repo-b/api/v1;v1";

import "google/protobuf/timestamp.proto";

message CreateOrderRequest {
  string customer_id = 1;
  string item_name = 2;
  int64 amount = 3;
}

message Order {
  string id = 1;
  string customer_id = 2;
  string item_name = 3;
  int64 amount = 4;
  string status = 5;
  string idempotency_key = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CreateOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  string id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message CancelOrderRequest {
  string id = 1;
}

message CancelOrderResponse {
  Order order = 1;
}

message GetRecentPurchasesRequest {
  int32 limit = 1;
}

message GetRecentPurchasesResponse {
  repeated Order orders = 1;
}

message SubscribeToOrderUpdatesRequest {
  string id = 1;
}

message SubscribeToOrderUpdatesResponse {
  string id = 1;
  string status = 2;
  google.protobuf.Timestamp updated_at = 3;
}

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc GetRecentPurchases(GetRecentPurchasesRequest) returns (GetRecentPurchasesResponse);
  rpc SubscribeToOrderUpdates(SubscribeToOrderUpdatesRequest) returns (stream SubscribeToOrderUpdatesResponse);
}
